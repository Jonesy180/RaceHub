<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#071018">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>RaceHub</title>
<link rel="stylesheet" href="style.css?v=5.4.21">
</head>
<body>
<div id="guideWelcome" class="rhGuidePage hidden" aria-hidden="true">
  <div class="rhGuideFrame">
    <img src="assets/guide/rh-ui-001-first-time-welcome.png" alt="RaceHub — Start your journey.">
    <button id="rhGuideP1Next" class="rhGuideHotspot rhGuideP1Next" type="button" aria-label="Start your journey"></button>
  </div>
</div>

<div id="guideHubsIntro" class="rhGuidePage hidden" aria-hidden="true">
  <div class="rhGuideFrame">
    <img src="assets/guide/rh-ui-002-hubs-introduction.png" alt="Meet Hubs.">
    <button id="rhGuideP2Back" class="rhGuideHotspot rhGuideP2Back" type="button" aria-label="Back"></button>
    <button id="rhGuideP2Next" class="rhGuideHotspot rhGuideP2Next" type="button" aria-label="Let's go"></button>
  </div>
</div>

<div id="guideDriverProfile" class="rhGuidePage hidden" aria-hidden="true">
  <div class="rhGuideFrame">
    <img src="assets/guide/rh-ui-003-driver-profile.png" alt="RaceHub driver profile.">
    <input id="rhGuideDriverName" class="rhGuideInput rhGuideDriverName" style="left:23.0% !important;top:63.55% !important;width:68.0% !important;height:4.0% !important;margin:0 !important;padding:0 12px !important;font-size:19px !important;line-height:normal !important;transform:none !important;background:rgba(1,8,12,.97) !important;border-radius:10px !important;color:#fff !important;" type="text" autocomplete="name" aria-label="Driver Name">
    <input id="rhGuideRaceHubName" class="rhGuideInput rhGuideRaceHubName" style="left:23.0% !important;top:78.50% !important;width:68.0% !important;height:4.0% !important;margin:0 !important;padding:0 12px !important;font-size:19px !important;line-height:normal !important;transform:none !important;background:rgba(1,8,12,.97) !important;border-radius:10px !important;color:#fff !important;" type="text" aria-label="RaceHub Name">
    <button id="rhGuideP3Back" class="rhGuideHotspot rhGuideP3Back" type="button" aria-label="Back"></button>
    <button id="rhGuideP3Next" class="rhGuideHotspot rhGuideP3Next" type="button" aria-label="Next"></button>
  </div>
</div>

<div class="splash"><div class="splashInner"><img class="splashBrand" src="assets/brand/racehub-wordmark.svg" alt="RaceHub"><div class="small">Version 5.4.11 • Garage Manufacturer Filter Fix</div></div></div>
<header><div class="hero"><img class="headerBrand" src="assets/brand/racehub-wordmark.svg" alt="RaceHub — Track, Record, Improve"></div></header>
<main>
<section id="festival" class="screen"></section>
<section id="events" class="screen hidden"></section>
<section id="event" class="screen hidden"></section>
<section id="garage" class="screen hidden"></section>
<section id="hall" class="screen hidden"></section>
<section id="more" class="screen hidden"></section>
</main>
<nav class="nav">
<button data-screen="festival"><span class="ico">🏁</span><b>Festival</b></button>
<button data-screen="events"><span class="ico">🗓️</span><b>Events</b></button>
<button data-screen="garage"><span class="ico">🚗</span><b>Garage</b></button>
<button data-screen="hall"><span class="ico">🏆</span><b>Leaderboard</b></button>
<button data-screen="more"><span class="ico">📈</span><b>Stats</b></button>
</nav>
<div id="toast" class="toast"></div>

<button id="rhDevGuideReset" class="rhDevGuideReset" type="button"
  onclick="localStorage.removeItem('RaceHub_Guide_Progress'); location.reload();"
  aria-label="Development only: restart Guide from Page 1">DEV · RESET GUIDE</button>

<script src="js/seed-data.js?v=5.3.6"></script>
<script src="js/core.js?v=5.3.6"></script>
<script src="js/race-director.js?v=5.3.7"></script>
<script src="js/views.js?v=5.4.11"></script>
<script src="js/celebrations.js?v=5.3.6"></script>
<script src="js/garage.js?v=5.3.9"></script>
<script src="js/control-centre.js?v=5.3.6"></script>
<script src="js/guide.js?v=5.4.21"></script>
<script src="js/bootstrap.js?v=5.4.18"></script>
</body>
</html>
